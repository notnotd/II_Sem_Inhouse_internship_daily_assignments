<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Swap Assignment: Live Posts Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        .custom-card {
            border-left: 5px solid #0d6efd;
            transition: transform 0.2s;
        }
        .custom-card:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Live Exploration Feed</h2>
            <span id="card-badge" class="badge bg-primary fs-5">0 Posts</span>
        </div>
        
        <input type="text" id="search" class="form-control mb-4 shadow-sm" placeholder="Search posts by title or body text...">
        
        <div id="container" class="row g-4">
            <div id="loading" class="text-center w-100 py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2 text-muted fw-semibold">Fetching Posts from API...</p>
            </div>
        </div>
    </div> 

    <script>
$(document).ready(function() {
    const apiUrl = 'https://jsonplaceholder.typicode.com/posts';

    fetch(apiUrl)
        .then(response => {
            if (!response.ok) {
                throw new Error("Network response was not ok");
            }
            return response.json();
        })
        .then(posts => {
            $("#loading").remove();
            let html = "";
            const limitedPosts = posts.slice(0, 20);
            
            $("#card-badge").text(`${limitedPosts.length} Posts`);

            limitedPosts.forEach(post => {
                html += `
                <div class="col-md-6 card-item">
                    <div class="card shadow-sm h-100 custom-card">
                        <div class="card-body">
                            <span class="text-uppercase text-muted small fw-bold">Post #${post.id}</span>
                            <h4 class="card-title text-capitalize mt-1">${post.title}</h4>
                            
                            <button class="btn btn-outline-primary btn-sm mt-2 btn-toggle-details">
                                Read Content
                            </button>
                            
                            <div class="details mt-3" style="display:none;">
                                <p class="card-text text-secondary text-capitalize">${post.body}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
            });

            $("#container").html(html);
        })
        .catch(error => {
            console.error("Error fetching data:", error);
            $("#container").html(`
                <div class="col-12">
                    <div class="alert alert-danger text-center shadow-sm" role="alert">
                        <h4 class="alert-heading">Oops! Something went wrong</h4>
                        <p class="mb-0">Failed to fetch the resource feed. Please check your connection or try again later.</p>
                    </div>
                </div>
            `);
            $("#card-badge").text("Error");
        });

    $(document).on("click", ".btn-toggle-details", function(){
        $(this).next(".details").slideToggle(200);
        
        const isHidden = $(this).next(".details").is(":hidden");
        $(this).text(isHidden ? "Read Content" : "Close Content");
    });

    $("#search").keyup(function(){
        let val = $(this).val().toLowerCase();
        let visibleCount = 0;

        $(".card-item").each(function(){
            let title = $(this).find("h4").text().toLowerCase();
            let body = $(this).find(".card-text").text().toLowerCase();
            
            if(title.includes(val) || body.includes(val)){
                $(this).show(); 
                visibleCount++;
            } else {
                $(this).hide(); 
            }
        });

        $("#card-badge").text(`${visibleCount} Posts`);
    });
});
    </script>
</body>
</html>
